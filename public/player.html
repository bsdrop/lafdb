<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover"
		/>
		<link rel="manifest" href="/manifest.webmanifest">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="theme-color" content="#6e58ff" />
		<link rel="apple-touch-icon" href="app-icon.png">
		<script src="/common.js"></script>
		<title>플레이어</title>
		<link rel="stylesheet" href="/player.css">
	</head>
	<body>
		<noscript>JavaScript가 비활성화되어 있습니다. 활성화 후 다시 시도해주세요.</noscript>
		<!-- ── Share sheet ─────────────────────────────────────────────────── -->
		<div id="share-overlay"></div>
		<div id="share-sheet" aria-modal="true" role="dialog" aria-labelledby="share-title" aria-hidden="true">
			<div id="share-handle" aria-hidden="true"></div>
			<div id="share-title">공유</div>

			<!-- 시간 포함 옵션 (에피소드 공유에만 표시) -->
			<div
				class="share-toggle-row"
				id="share-time-row"
				style="display: none"
			>
				<span class="share-toggle-label">현재 재생 위치 포함</span>
				<label class="s-toggle" aria-label="재생 위치 포함">
					<input type="checkbox" id="share-time-toggle" checked aria-label="재생 위치 포함" />
					<span class="s-toggle-track"></span>
					<span class="s-toggle-thumb"></span>
				</label>
			</div>

			<div id="share-rows"></div>
		</div>

		<!-- ── Main layout ─────────────────────────────────────────────────── -->
		<div id="main-layout">
			<div id="player-col">
				<div id="player-core">
					<div id="video-box">
						<video id="v" controls autoplay playsinline x-webkit-airplay="allow" aria-label="동영상 플레이어"></video>
						<button id="skip-opening" class="skip-btn">
							오프닝 스킵 →
						</button>
						<button id="skip-ending" class="skip-btn">
							엔딩 스킵 →
						</button>
					</div>
					<div id="timeline-bar" title="클릭하여 탐색">
						<div id="timeline-track">
							<div id="timeline-progress"></div>
						</div>
					</div>
					<div id="ep-info">
						<span id="ep-title"></span>
						<button id="btn-mpv" class="ep-icon-btn" title="mpv 명령 복사" aria-label="mpv 명령 복사" onclick="window.mpvCopy && window.mpvCopy()">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
								<polygon points="8 5 19 12 8 19 8 5"></polygon>
								<line x1="5" y1="5" x2="5" y2="19"></line>
							</svg>
						</button>
						<button id="btn-capture" class="ep-icon-btn" title="PNG 캡처" aria-label="PNG 캡처">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
								<path d="M4 7h4l2-2h4l2 2h4v12H4z"></path>
								<circle cx="12" cy="13" r="4"></circle>
							</svg>
						</button>
						<button id="btn-download" class="ep-icon-btn" title="다운로드" aria-label="다운로드" hidden>
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
								<polyline points="7 10 12 15 17 10"/>
								<line x1="12" y1="15" x2="12" y2="3"/>
							</svg>
						</button>
						<button id="btn-share" class="ep-icon-btn" title="공유" aria-label="공유">
							<svg
								width="16" height="16"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<circle cx="18" cy="5" r="3" />
								<circle cx="6" cy="12" r="3" />
								<circle cx="18" cy="19" r="3" />
								<line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
								<line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
							</svg>
						</button>
						<button id="btn-fullscreen" class="ep-icon-btn" title="전체화면" aria-label="전체화면">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
								<polyline points="15 3 21 3 21 9"></polyline>
								<polyline points="9 21 3 21 3 15"></polyline>
								<line x1="21" y1="3" x2="14" y2="10"></line>
								<line x1="3" y1="21" x2="10" y2="14"></line>
							</svg>
						</button>
						<div id="settings-wrap">
							<button id="btn-settings"
								class="ep-icon-btn"
								title="설정"
								aria-label="설정"
								aria-controls="settings-panel"
								aria-expanded="false"
							>
								⋮
							</button>
							<div id="settings-panel" aria-hidden="true">
								<div class="settings-row">
									자동 스킵
									<button id="btn-autoskip"
										class="settings-toggle"
										aria-pressed="false"
									>
										끄기
									</button>
								</div>
								<div class="settings-row">
									자동 재생
									<button id="btn-autoplay"
										class="settings-toggle"
										aria-pressed="false"
									>
										끄기
									</button>
								</div>
								<div class="settings-row">
									배속
									<div style="display:flex;align-items:center;gap:4px;">
										<button id="btn-speed-down" class="settings-toggle" aria-label="배속 감소">−</button>
										<button id="btn-speed-val" class="settings-toggle" title="탭하여 1x로 초기화" style="min-width:46px;">1x</button>
										<button id="btn-speed-up" class="settings-toggle" aria-label="배속 증가">+</button>
									</div>
								</div>
								<div class="settings-row">
									<a id="btn-item" style="display: none" href="#"
										>작품 보기 →</a
									>
								</div>
							</div>
						</div>
					</div>
					<div id="controls">
						<select id="quality-selector" aria-label="화질 선택">
							<option value="">Quality</option>
						</select>
						<button id="btn-prev-ep" class="ctrl-btn" disabled>
							◀ 이전
						</button>
						<div id="ep-list-wrap">
							<button id="btn-ep-list" class="ctrl-btn" aria-haspopup="menu" aria-controls="ep-list-panel" aria-expanded="false">
								목록 ▾
							</button>
							<div id="ep-list-panel" aria-hidden="true"></div>
						</div>
						<button id="btn-next-ep" class="ctrl-btn" disabled>
							다음 ▶
						</button>
					</div>
				</div>
			</div>

			<div id="comments-col">
				<div id="comments-wrap">
					<div id="comments-header">
						<span id="comments-toggle">댓글</span>
						<button id="btn-comments-layout" title="댓글 위치 변경" aria-label="댓글 위치 변경">
							<svg id="icon-comments-side" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
								<rect x="3" y="3" width="18" height="18" rx="2"/>
								<line x1="15" y1="3" x2="15" y2="21"/>
							</svg>
							<svg id="icon-comments-below" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
								<rect x="3" y="3" width="18" height="18" rx="2"/>
								<line x1="3" y1="13" x2="21" y2="13"/>
							</svg>
						</button>
						<div id="comments-sort">
							<button class="csort-btn active" data-sorting="top" aria-pressed="true">
								인기순
							</button>
							<button class="csort-btn" data-sorting="newest" aria-pressed="false">
								최신순
							</button>
							<button class="csort-btn" data-sorting="oldest" aria-pressed="false">
								오래된순
							</button>
						</div>
					</div>
					<div id="comments-list"></div>
				</div>
			</div>
		</div>

	<!-- ── Download modal ──────────────────────────────────────────────── -->
	<div id="dl-modal" hidden>
		<div id="dl-dialog" role="dialog" aria-modal="true" aria-labelledby="dl-title">
			<h3 id="dl-title">다운로드</h3>
			<div class="dl-row">
				<label for="dl-quality-sel">화질</label>
				<select id="dl-quality-sel"></select>
			</div>
			<div id="dl-prog-wrap" hidden>
				<div id="dl-prog-bar-bg"><div id="dl-prog-bar"></div></div>
				<div id="dl-prog-text"></div>
				<div id="dl-prog-stats"></div>
			</div>
			<div class="dl-btns">
				<button class="dl-btn" id="dl-btn-cancel">취소</button>
				<button class="dl-btn" id="dl-btn-bg" hidden>하단에 숨기기</button>
				<button class="dl-btn" id="dl-btn-start">다운로드</button>
			</div>
		</div>
	</div>

	<div id="dl-toast" hidden>
		<div id="dl-toast-top">
			<div id="dl-toast-info">
				<div id="dl-toast-title">다운로드 중</div>
				<div id="dl-toast-sub"></div>
			</div>
			<button class="dl-toast-btn" id="dl-toast-open">보기</button>
			<button class="dl-toast-btn" id="dl-toast-abort" aria-label="다운로드 취소">✕</button>
		</div>
		<div id="dl-toast-bar-bg"><div id="dl-toast-bar"></div></div>
	</div>

	<script src="/player-page.js"></script>
</body>
</html>
